name: Data Pipeline

on:
  schedule:
    # Source cadence: the EPBC Act threatened-species lists are amended a few
    # times a year (irregular). Quarterly is proportional and well within the
    # monthly-fastest rule. Staggered to the 9th at 04:23 UTC so repos don't
    # all fire together.
    - cron: '23 4 9 1,4,7,10 *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['pipeline/**']

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node pipeline/collect.mjs
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "Update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || (git pull --rebase && git push)
